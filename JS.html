<script>
/**
 * SIMKA GenBI UNG Client Script
 * File: JS.html
 * Handles SPA navigation, WhatsApp parsing, fuzzy matching, dynamic rendering, and GAS API calls.
 */

// Global State
let anggotaList = [];
let operatorsList = [];
let currentOperator = null;
let parsedWhatsAppList = [];
let dashboardData = null;
let chartDivisiInstance = null;
let chartKasInstance = null;

// Safe Storage Wrapper to prevent iframe SecurityError crashes
const SafeStorage = {
  data: {},
  getItem: function(key) {
    try {
      return localStorage.getItem(key);
    } catch (e) {
      return this.data[key] || null;
    }
  },
  setItem: function(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {
      this.data[key] = value;
    }
  },
  removeItem: function(key) {
    try {
      localStorage.removeItem(key);
    } catch (e) {
      delete this.data[key];
    }
  }
};

// ----------------------------------------------------
// INITIALIZATION
// ----------------------------------------------------
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initApp);
} else {
  initApp();
}

function initApp() {
  // Check session storage safely
  const cachedOperator = SafeStorage.getItem("simka_operator");
  if (cachedOperator) {
    try {
      currentOperator = JSON.parse(cachedOperator);
      showMainApp();
      loadAllData();
    } catch(e) {
      SafeStorage.removeItem("simka_operator");
      showLoginScreen();
    }
  } else {
    showLoginScreen();
  }
}

function showLoginScreen() {
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app-sidebar").style.display = "none";
  document.getElementById("app-main").style.display = "none";
  loadOperatorsDropdown();
}

function showMainApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-sidebar").style.display = "flex";
  document.getElementById("app-main").style.display = "block";
  
  // Render operator info in sidebar
  document.getElementById("sidebar-op-name").innerText = currentOperator.nama;
  document.getElementById("sidebar-op-role").innerText = `${currentOperator.jabatan} - ${currentOperator.divisi}`;
  document.getElementById("sidebar-op-avatar").innerText = currentOperator.nama.charAt(0).toUpperCase();
  
  // 1. Hide Admin tab navigation for Kadiv
  const isKadiv = currentOperator.jabatan === 'Kadiv';
  document.getElementById("nav-admin").style.display = isKadiv ? "none" : "flex";
  
  // Hide Bendahara tab navigation for non-Bendahara
  const isBendahara = currentOperator.jabatan === 'Bendahara';
  document.getElementById("nav-bendahara").style.display = isBendahara ? "flex" : "none";
  
  // 2. Hide Add Member button for Kadiv
  const btnAdd = document.getElementById("btn-tambah-anggota");
  if (btnAdd) {
    btnAdd.style.display = isKadiv ? "none" : "block";
  }
  
  // 3. Configure Active Month Configuration Card (Secretary Only)
  const isSekretaris = currentOperator.jabatan === 'Sekretaris';
  const selectMonth = document.getElementById("admin-active-month-select");
  const btnMonth = document.getElementById("btn-save-active-month");
  const cardMonth = document.getElementById("admin-grading-activation-card");
  
  if (selectMonth && btnMonth && cardMonth) {
    if (isSekretaris) {
      selectMonth.disabled = false;
      btnMonth.disabled = false;
      cardMonth.style.opacity = "1";
    } else {
      selectMonth.disabled = true;
      btnMonth.disabled = true;
      cardMonth.style.opacity = "0.6";
    }
  }
  
  // Load active month config for Admin tab dropdown
  if (!isKadiv) {
    loadActiveGradingMonth();
  }
  
  // Show default tab (Dashboard)
  showTab('dashboard-tab');
}

// ----------------------------------------------------
// ROUTER & NAVIGATION
// ----------------------------------------------------
function showTab(tabId) {
  // Security check: Kadiv cannot access Admin tab
  if (tabId === 'admin-tab' && currentOperator.jabatan === 'Kadiv') {
    showToast("Akses ditolak: Kadiv tidak diizinkan masuk ke menu Sistem & Audit.", "error");
    showTab('dashboard-tab');
    return;
  }
  
  // Security check: Non-Bendahara cannot access Bendahara tab
  if (tabId === 'bendahara-tab' && currentOperator.jabatan !== 'Bendahara') {
    showToast("Akses ditolak: Halaman Bendahara hanya dapat diakses oleh Bendahara Komisariat.", "error");
    showTab('dashboard-tab');
    return;
  }

  // Hide all tabs
  const tabs = document.querySelectorAll(".tab-panel");
  tabs.forEach(t => t.style.display = "none");
  
  // Show selected tab
  document.getElementById(tabId).style.display = "block";
  
  // Update sidebar active state
  const navItems = document.querySelectorAll(".nav-item");
  navItems.forEach(item => {
    if (item.getAttribute("onclick").includes(tabId)) {
      item.classList.add("active");
    } else {
      item.classList.remove("active");
    }
  });

  // Handle specific tab actions on load
  if (tabId === 'dashboard-tab' && anggotaList.length > 0) {
    renderDashboard();
  } else if (tabId === 'members-tab' && anggotaList.length > 0) {
    renderMembersTable();
  } else if (tabId === 'input-tab') {
    initInputTabDates();
  } else if (tabId === 'bendahara-tab') {
    initBendaharaTab();
  } else if (tabId === 'grade-tab') {
    initGradingTab();
  } else if (tabId === 'recap-tab') {
    loadMonthlyRecap();
  } else if (tabId === 'admin-tab') {
    loadAuditTrail();
  }
}

function initInputTabDates() {
  const todayStr = getTodayDateString();
  const waDate = document.getElementById("wa-tanggal-input");
  const manualDate = document.getElementById("manual-tanggal-input");
  if (waDate && !waDate.value) {
    waDate.value = todayStr;
  }
  if (manualDate && !manualDate.value) {
    manualDate.value = todayStr;
  }
}

function getTodayDateString() {
  const d = new Date();
  const year = d.getFullYear();
  var month = d.getMonth() + 1;
  var day = d.getDate();
  if (month < 10) month = '0' + month;
  if (day < 10) day = '0' + day;
  return year + '-' + month + '-' + day;
}

// Toggle mobile sidebar
function toggleSidebar() {
  const sidebar = document.getElementById("app-sidebar");
  sidebar.classList.toggle("mobile-open");
}

// Hide mobile sidebar when item clicked
document.querySelectorAll(".nav-item").forEach(item => {
  item.addEventListener("click", () => {
    document.getElementById("app-sidebar").classList.remove("mobile-open");
  });
});

// ----------------------------------------------------
// API REQUESTS & STATE SYNC
// ----------------------------------------------------
function loadOperatorsDropdown() {
  if (typeof google === "undefined" || !google.script || !google.script.run) {
    setTimeout(loadOperatorsDropdown, 50);
    return;
  }
  showLoader();
  google.script.run
    .withSuccessHandler(function(list) {
      hideLoader();
      operatorsList = list;
      const select = document.getElementById("login-operator-select");
      select.innerHTML = '<option value="">-- Pilih Operator --</option>';
      list.forEach(op => {
        const option = document.createElement("option");
        option.value = op.id;
        option.text = `${op.nama} (${op.jabatan})`;
        select.appendChild(option);
      });
    })
    .withFailureHandler(function(err) {
      hideLoader();
      showToast(err.message, "error");
    })
    .getOperatorList();
}

function loadAllData() {
  if (typeof google === "undefined" || !google.script || !google.script.run) {
    setTimeout(loadAllData, 50);
    return;
  }
  showLoader();
  google.script.run
    .withSuccessHandler(function(data) {
      anggotaList = data;
      google.script.run
        .withSuccessHandler(function(dashData) {
          hideLoader();
          dashboardData = dashData;
          renderDashboard();
          renderMembersTable();
          populateAnggotaDropdowns();
          
          // Refresh active tab if it's Bendahara
          const activeItem = document.querySelector(".nav-item.active");
          if (activeItem) {
            if (activeItem.getAttribute("onclick").includes("bendahara-tab")) {
              initBendaharaTab();
            }
          }
        })
        .withFailureHandler(function(err) {
          hideLoader();
          showToast("Gagal memuat statistik dashboard: " + err.message, "error");
        })
        .getDashboardData();
    })
    .withFailureHandler(function(err) {
      hideLoader();
      showToast("Gagal memuat data dari spreadsheet: " + err.message, "error");
    })
    .getSemuaAnggota();
}

// Populate standard dropdown list for manual input
function populateAnggotaDropdowns() {
  const manualSelect = document.getElementById("manual-anggota-select");
  if (!manualSelect) return;
  manualSelect.innerHTML = '<option value="">-- Pilih Anggota --</option>';
  anggotaList.forEach(a => {
    const option = document.createElement("option");
    option.value = a.id;
    option.text = `${a.nama} (${a.nim || 'Tanpa NIM'})`;
    manualSelect.appendChild(option);
  });
}

// ----------------------------------------------------
// AUTHENTICATION FLOW
// ----------------------------------------------------
function handleLogin(event) {
  event.preventDefault();
  const id = document.getElementById("login-operator-select").value;
  const pin = document.getElementById("login-pin-input").value;
  
  if (!id || !pin) {
    showToast("Pilih operator dan masukkan PIN.", "error");
    return;
  }
  
  showLoader();
  google.script.run
    .withSuccessHandler(function(operator) {
      hideLoader();
      currentOperator = operator;
      SafeStorage.setItem("simka_operator", JSON.stringify(operator));
      document.getElementById("login-pin-input").value = "";
      showToast(`Selamat datang, ${operator.nama}!`, "success");
      showMainApp();
      loadAllData();
    })
    .withFailureHandler(function(err) {
      hideLoader();
      showToast(err.message, "error");
    })
    .validasiLoginOperator(id, pin);
}

function handleLogout() {
  SafeStorage.removeItem("simka_operator");
  currentOperator = null;
  showLoginScreen();
  showToast("Anda telah keluar dari sesi.", "success");
}

// ----------------------------------------------------
// DASHBOARD RENDERING
// ----------------------------------------------------
function renderDashboard() {
  // Exemption Rule: Filter data anggota (jabatan harus "Anggota" saja)
  let listAnggota = anggotaList.filter(a => a.jabatan === "Anggota");
  
  // 1. Apply division filtering based on BPH choices or Kadiv division lock
  if (currentOperator.jabatan === 'Kadiv') {
    listAnggota = listAnggota.filter(a => a.divisi === currentOperator.divisi);
    // Force dropdown and hide selector
    const filterEl = document.getElementById("dash-divisi-filter");
    if (filterEl) {
      filterEl.value = currentOperator.divisi;
    }
    const containerEl = document.getElementById("dash-filter-container");
    if (containerEl) {
      containerEl.style.display = "none";
    }
  } else {
    // BPH user: can use the filter
    const filterEl = document.getElementById("dash-divisi-filter");
    const containerEl = document.getElementById("dash-filter-container");
    if (containerEl) {
      containerEl.style.display = "block";
    }
    if (filterEl) {
      const selDiv = filterEl.value;
      if (selDiv && selDiv !== "Semua") {
        listAnggota = listAnggota.filter(a => a.divisi === selDiv);
      }
    }
  }
  
  // 2. Statistics Cards
  document.getElementById("dash-total-anggota").innerText = listAnggota.length;
  
  // Total Kegiatan (sum counts from anggota)
  let totalKegiatan = 0;
  listAnggota.forEach(a => {
    totalKegiatan += (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);
  });
  document.getElementById("dash-total-kegiatan").innerText = totalKegiatan;
  
  // Average Keaktifan
  const avg = listAnggota.length > 0 ? (totalKegiatan / listAnggota.length).toFixed(1) : 0;
  document.getElementById("dash-avg-kegiatan").innerText = avg;

  // 3. Zona Kontributor Utama (Left Panel) - Top 10 by activity
  const sortedContributors = [...listAnggota].sort((a, b) => {
    const totalA = (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);
    const totalB = (b.panitia || 0) + (b.delegasiKegiatan || 0) + (b.delegasiPeserta || 0);
    return totalB - totalA;
  });
  
  const contListEl = document.getElementById("zona-kontributor-list");
  contListEl.innerHTML = "";
  if (sortedContributors.length === 0) {
    contListEl.innerHTML = '<div class="stat-sub">Tidak ada data anggota</div>';
  } else {
    // Show top 10
    const topCount = Math.min(sortedContributors.length, 10);
    for (let i = 0; i < topCount; i++) {
      const a = sortedContributors[i];
      const total = (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);
      
      const item = document.createElement("div");
      item.className = "member-list-item";
      item.setAttribute("onclick", `openMemberProfile(${a.id})`);
      item.innerHTML = `
        <div class="member-item-info">
          <span class="member-item-name">${a.nama}</span>
          <span class="member-item-meta">${a.divisi} • NIM: ${a.nim}</span>
        </div>
        <div class="member-item-score">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px;color:var(--primary-soft)">
            <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.6 3.102-1.196 4.657c-.21.819.674 1.463 1.397 1.014L10 15.633l4.185 2.501c.723.449 1.607-.195 1.397-1.014l-1.196-4.657 3.6-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
          </svg>
          ${total}
        </div>
      `;
      contListEl.appendChild(item);
    }
  }

  // 4. Zona Prioritas Penugasan (Right Panel) - sorted by activity ascending
  // Exclude BPH and Kadiv automatically because we filtered listAnggota
  const sortedPriorities = [...listAnggota].sort((a, b) => {
    const totalA = (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);
    const totalB = (b.panitia || 0) + (b.delegasiKegiatan || 0) + (b.delegasiPeserta || 0);
    return totalA - totalB;
  });

  const prioListEl = document.getElementById("zona-prioritas-list");
  prioListEl.innerHTML = "";
  if (sortedPriorities.length === 0) {
    prioListEl.innerHTML = '<div class="stat-sub">Tidak ada data anggota</div>';
  } else {
    // Show top 10 low active
    const topCount = Math.min(sortedPriorities.length, 10);
    for (let i = 0; i < topCount; i++) {
      const a = sortedPriorities[i];
      const total = (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);
      
      // Determine badge
      let badge = "";
      if (a.penerimaanKe == 4 && total === 0) {
        badge = `<span class="badge badge-danger">Wajib Proker (Penerimaan 4)</span>`;
      } else {
        badge = `<span class="badge badge-primary">Penerimaan Ke-${a.penerimaanKe}</span>`;
      }

      const item = document.createElement("div");
      item.className = "member-list-item";
      item.setAttribute("onclick", `openMemberProfile(${a.id})`);
      item.innerHTML = `
        <div class="member-item-info">
          <span class="member-item-name">${a.nama} ${badge}</span>
          <span class="member-item-meta">${a.divisi} • NIM: ${a.nim}</span>
        </div>
        <div class="member-item-score" style="color:var(--ruby)">
          ${total}
        </div>
      `;
      prioListEl.appendChild(item);
    }
  }

  // 5. Render Chart.js Dashboard (Division distribution, Kas percentage, and Top 5 Leaderboard)
  renderChartJsDashboard(listAnggota);
}

function renderChartJsDashboard(listAnggota) {
  // 1. Division distribution chart (Doughnut)
  const ctxDiv = document.getElementById("chart-divisi");
  if (!ctxDiv) return;

  const divisions = [
    "Pendidikan",
    "Kominfo",
    "Lingkungan Hidup",
    "Kesehatan Masyarakat",
    "Kewirausahaan",
    "Potensi Diri"
  ];
  
  const divCounts = divisions.map(div => {
    return listAnggota.filter(a => a.divisi === div).length;
  });

  if (chartDivisiInstance) {
    chartDivisiInstance.destroy();
  }

  chartDivisiInstance = new Chart(ctxDiv, {
    type: 'doughnut',
    data: {
      labels: divisions,
      datasets: [{
        data: divCounts,
        backgroundColor: [
          '#533afd', // Pendidikan (Primary)
          '#ff3b30', // Kominfo (Danger)
          '#34c759', // Lingkungan Hidup (Success)
          '#ff9500', // Kesehatan Masyarakat (Warning)
          '#af52de', // Kewirausahaan (Purple)
          '#5856d6'  // Potensi Diri (Indigo)
        ],
        borderWidth: 2,
        borderColor: 'var(--canvas-card)'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: 'var(--ink-secondary)',
            font: { family: 'Poppins', size: 11 }
          }
        }
      }
    }
  });

  // 2. Realisasi Pembayaran Kas per Semester (Bar)
  const ctxKas = document.getElementById("chart-kas");
  if (!ctxKas) return;

  if (chartKasInstance) {
    chartKasInstance.destroy();
  }

  let labels = [];
  let percentages = [];

  if (dashboardData && dashboardData.kasStats && dashboardData.kasStats.length > 0) {
    dashboardData.kasStats.forEach(stat => {
      labels.push(`${stat.semester} ${stat.tahunAkademik}`);
      percentages.push(stat.persentase);
    });
  } else {
    labels = ["Tidak ada data"];
    percentages = [0];
  }

  chartKasInstance = new Chart(ctxKas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Persentase Lunas',
        data: percentages,
        backgroundColor: 'var(--primary)',
        borderRadius: 6,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0,
          max: 100,
          ticks: {
            color: 'var(--ink-mute)',
            callback: function(value) { return value + '%'; }
          },
          grid: {
            color: 'var(--hairline)'
          }
        },
        x: {
          ticks: {
            color: 'var(--ink-mute)',
            font: { family: 'Poppins', size: 10 }
          },
          grid: {
            display: false
          }
        }
      },
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              return `Persentase Lunas: ${context.parsed.y}%`;
            }
          }
        }
      }
    }
  });

  // 3. Top 5 active members leaderboard
  const leaderboardEl = document.getElementById("leaderboard-list");
  if (leaderboardEl) {
    leaderboardEl.innerHTML = "";
    if (dashboardData && dashboardData.leaderboard && dashboardData.leaderboard.length > 0) {
      dashboardData.leaderboard.forEach(a => {
        const item = document.createElement("div");
        item.className = "member-list-item";
        const match = anggotaList.find(ang => ang.nim === a.nim);
        if (match) {
          item.setAttribute("onclick", `openMemberProfile(${match.id})`);
        }
        item.innerHTML = `
          <div class="member-item-info">
            <span class="member-item-name">${a.nama}</span>
            <span class="member-item-meta">${a.divisi} • NIM: ${a.nim}</span>
          </div>
          <div class="member-item-score" style="color: var(--primary);">
            🏅 ${a.jumlahPartisipasi}
          </div>
        `;
        leaderboardEl.appendChild(item);
      });
    } else {
      leaderboardEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--ink-mute);font-size:12px;">Belum ada riwayat kegiatan baru.</div>';
    }
  }
}

// ----------------------------------------------------
// MEMBERS DIRECTORY
// ----------------------------------------------------
function renderMembersTable() {
  const tbody = document.getElementById("members-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";
  
  const searchVal = document.getElementById("member-search").value.toLowerCase();
  const filterPenerimaan = document.getElementById("filter-penerimaan").value;
  
  const divFilterEl = document.getElementById("filter-divisi");
  let filterDivisi = divFilterEl ? divFilterEl.value : "";
  
  // Security division filter override for Kadiv
  if (currentOperator.jabatan === 'Kadiv') {
    filterDivisi = currentOperator.divisi;
    if (divFilterEl) {
      divFilterEl.value = currentOperator.divisi;
      divFilterEl.disabled = true;
      divFilterEl.style.display = "none";
    }
  } else {
    if (divFilterEl) {
      divFilterEl.disabled = false;
      divFilterEl.style.display = "inline-block";
    }
  }
  
  const filterJabatan = document.getElementById("filter-jabatan").value;
  
  // Base members list (Kadiv restricted to their division)
  let baseAnggotaList = anggotaList;
  if (currentOperator.jabatan === 'Kadiv') {
    baseAnggotaList = anggotaList.filter(a => a.divisi === currentOperator.divisi);
  }
  
  // Counters for Gelombang
  let countP1 = 0, countP2 = 0, countP3 = 0, countP4 = 0;
  
  const filtered = baseAnggotaList.filter(a => {
    if (a.penerimaanKe == 1) countP1++;
    if (a.penerimaanKe == 2) countP2++;
    if (a.penerimaanKe == 3) countP3++;
    if (a.penerimaanKe == 4) countP4++;
    
    const matchesSearch = a.nama.toLowerCase().includes(searchVal) || a.nim.includes(searchVal);
    const matchesPenerimaan = filterPenerimaan === "" || a.penerimaanKe == filterPenerimaan;
    const matchesDivisi = filterDivisi === "" || a.divisi === filterDivisi;
    const matchesJabatan = filterJabatan === "" || a.jabatan === filterJabatan;
    
    return matchesSearch && matchesPenerimaan && matchesDivisi && matchesJabatan;
  });
  
  // Render stats counters
  document.getElementById("p1-count").innerText = `${countP1} org`;
  document.getElementById("p2-count").innerText = `${countP2} org`;
  document.getElementById("p3-count").innerText = `${countP3} org`;
  document.getElementById("p4-count").innerText = `${countP4} org`;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--ink-mute)">Tidak ada data anggota cocok.</td></tr>';
    return;
  }
  
  filtered.forEach(a => {
    const tr = document.createElement("tr");
    tr.className = "clickable-row";
    tr.setAttribute("onclick", `openMemberProfile(${a.id})`);
    
    let jabBadge = "";
    if (a.jabatan === "Ketua") jabBadge = `<span class="badge badge-gold">Ketua</span>`;
    else if (a.jabatan === "Sekretaris" || a.jabatan === "Bendahara") jabBadge = `<span class="badge badge-primary">${a.jabatan}</span>`;
    else if (a.jabatan === "Kadiv") jabBadge = `<span class="badge badge-blue">Kadiv</span>`;
    else jabBadge = `<span class="badge" style="background:var(--bg-hover);color:var(--ink-secondary);border:1px solid var(--hairline)">Anggota</span>`;
    
    const total = (a.panitia || 0) + (a.delegasiKegiatan || 0) + (a.delegasiPeserta || 0);

    tr.innerHTML = `
      <td class="text-tabular">${a.id}</td>
      <td style="font-weight:500;color:var(--ink)">${a.nama}</td>
      <td class="text-tabular">${a.nim || '-'}</td>
      <td>${a.divisi}</td>
      <td>Gel. ${a.penerimaanKe}</td>
      <td>${jabBadge}</td>

// Helper to identify if a token is a role/division indicator label instead of a member's name
function isRoleLabel(str) {
  if (!str) return false;
  var s = str.trim().toLowerCase();
  var roles = ["ketua", "sekretaris", "sekertaris", "bendahara", "koor", "koordinator", "anggota", "panitia", "bph", "kadiv", "perwakilan", "pj"];
  if (roles.indexOf(s) > -1) return true;
  if (s.indexOf("koor ") === 0 || s.indexOf("koordinator ") === 0) return true;
  if (s.indexOf("ketua ") === 0) return true;
  if (s.indexOf("sekretaris ") === 0 || s.indexOf("sekertaris ") === 0) return true;
  if (s.indexOf("bendahara ") === 0) return true;
  if (s.endsWith(" panitia") || s.endsWith(" divisi") || s.endsWith(" acara") || s.endsWith(" konsumsi") || s.endsWith(" perle") || s.endsWith(" pdd")) return true;
  return false;
}

// WhatsApp Text Parser Engine
function processWhatsAppList() {
  const rawText = document.getElementById("wa-paste-area").value;
  if (!rawText.trim()) {
    showToast("Masukkan salinan daftar WhatsApp terlebih dahulu.", "error");
    return;
  }
  
  // Clear previous preview list
  parsedWhatsAppList = [];
  const listEl = document.getElementById("wa-parsed-list");
  listEl.innerHTML = "";
  
  // Split per line
  const lines = rawText.split(String.fromCharCode(10));
  
  lines.forEach(line => {
    let cleanLine = line.trim();
    if (!cleanLine) return; // skip empty lines
    
    // Clean WhatsApp numbering/bullet symbols
    // E.g. "1. Ahmad", "- Budi", "• Charlie", "* Doni"
    const prefixRegex = new RegExp('^[-0-9+.*• ' + String.fromCharCode(9) + ']+', 'g');
    cleanLine = cleanLine.replace(prefixRegex, "").trim();
    
    // Split name and role/division (like "Ahmad - Panitia", "Budi : Peserta", "Charlie | Pendidikan", "Ketua Panitia : Farel")
    let parsedName = cleanLine;
    let parts = cleanLine.split(/[-:|]/);
    
    if (parts.length > 1) {
      var firstPart = parts[0].trim();
      var secondPart = parts[1].trim();
      
      if (isRoleLabel(firstPart)) {
        // If the first part is a role (e.g. "Ketua Panitia : Farel"), then the name is in the second part
        if (secondPart.length > 0) {
          parsedName = secondPart;
        } else {
          // If the second part is empty (e.g. "Anggota :"), we skip this line entirely
          return;
        }
      } else {
        // Standard "Name - Role" format, so the name is the first part
        parsedName = firstPart;
      }
    } else if (parts.length === 1) {
      parsedName = parts[0].trim();
    }
    
    // Skip if remaining name is too short
    if (parsedName.length < 2) return;
    
    // Check if the parsed name itself is a role label (e.g. if there was a line "Anggota" without colons)
    if (isRoleLabel(parsedName)) return;
    
    // Fuzzy matching against master list
    const bestMatch = findBestFuzzyMatch(parsedName);
    
    parsedWhatsAppList.push({
      rawName: parsedName,
      matchedId: bestMatch ? bestMatch.id : ""
    });
  });
  
  renderWhatsAppPreview();
}

function findBestFuzzyMatch(inputName) {
  let highestScore = 0;
  let bestMatch = null;
  
  anggotaList.forEach(a => {
    const score = getSimilarityScore(inputName, a.nama);
    if (score > highestScore) {
      highestScore = score;
      bestMatch = a;
    }
  });
  
  // Return best match only if similarity is reasonably high (e.g. > 45%)
  return highestScore > 45 ? bestMatch : null;
}

// Levenshtein distance similarity algorithm
function getLevenshteinDistance(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1, // substitution
          matrix[i][j - 1] + 1,     // insertion
          matrix[i - 1][j] + 1      // deletion
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

function getSimilarityScore(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  const maxLen = Math.max(a.length, b.length);
  if (maxLen === 0) return 100;
  const dist = getLevenshteinDistance(a, b);
  return Math.round((1 - dist / maxLen) * 100);
}

function showToast(message, type = "info") {
  const container = document.getElementById("toast-container");
  if (!container) return;
  
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  
  let icon = `
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;color:var(--primary-soft)">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.085 1.085l-.041.02H11.25v2.25h-.75v-2.25h-.75v-.75h1.5v-.75zM12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25z" />
    </svg>
  `; // info
  
  if (type === "success") {
    icon = `
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;color:#32cd32">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    `;
  } else if (type === "error") {
    icon = `
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:20px;height:20px;color:var(--ruby)">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
    `;
  }
  
  toast.innerHTML = `
    ${icon}
    <span>${message}</span>
  `;
  
  container.appendChild(toast);
  
  // Animate slide-in
  setTimeout(() => {
    toast.classList.add("active");
  }, 10);
  
  // Auto remove after 4 seconds
  setTimeout(() => {
    toast.classList.remove("active");
    setTimeout(() => {
      toast.remove();
    }, 300);
  }, 4000);
}

function loadKasData() {
  const semester = document.getElementById("kas-semester-select").value;

  if (!tahun) {

      hideLoader();

      renderKasTable(list);

    })

function renderKasTable(list) {
  const tbody = document.getElementById("kas-table-body");
  tbody.innerHTML = "";
  
  const filteredList = list.filter(a => a.jabatan === "Anggota");
  
  if (filteredList.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--ink-mute)">Tidak ada data anggota.</td></tr>';
    return;
  }
  
  const semester = document.getElementById("kas-semester-select").value;
  const tahun = document.getElementById("kas-tahun-select").value.trim();
  
  filteredList.forEach((a, index) => {
    const tr = document.createElement("tr");
    tr.className = "kas-row-item";
    tr.dataset.divisi = a.divisi;
    tr.dataset.penerimaan = a.penerimaanKe;
    tr.dataset.search = `${a.nama.toLowerCase()} ${a.nim}`;
    
    const isLunas = a.status === "Lunas";
    const statusClass = isLunas ? "lunas" : "belum-lunas";
    const statusText = isLunas ? "✅ Lunas" : "❌ Belum Lunas";
    
    tr.innerHTML = `
      <td class="text-nowrap">${index + 1}</td>
      <td style="font-weight: 500;">${a.nama}</td>
      <td class="text-tabular text-nowrap">${a.nim}</td>
      <td class="text-nowrap">${a.divisi}</td>
      <td class="text-nowrap">Gel. ${a.penerimaanKe}</td>
      <td class="text-nowrap">
        <button class="kas-toggle-btn ${statusClass}" onclick="handleToggleKas('${a.nim}', '${semester}', '${tahun}')">
          ${statusText}
        </button>
      </td>
      <td class="text-tabular text-nowrap" style="font-size: 13px; color: var(--ink-secondary);">
        ${a.tanggalBayar || "-"}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function updateKasSummary(list) {
  const container = document.getElementById("kas-summary-container");
  const label = document.getElementById("kas-percentage-label");
  const fill = document.getElementById("kas-progress-fill-element");
  
  const tacticalList = list.filter(a => a.jabatan === "Anggota");
  const total = tacticalList.length;
  const lunasCount = tacticalList.filter(a => a.status === "Lunas").length;
  
  if (total === 0) {
    container.style.display = "none";
    return;
  }
  
  const percentage = Math.round((lunasCount / total) * 100);
  label.textContent = `${percentage}% (${lunasCount} / ${total} Anggota)`;
  fill.style.width = `${percentage}%`;
  container.style.display = "block";
}

function handleToggleKas(nim, semester, tahun) {
  showLoader();
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      showToast(`Status kas untuk NIM ${nim} diubah menjadi ${res.status}.`, "success");
      loadKasData();
    })
    .withFailureHandler(function(err) {
      hideLoader();
      showToast("Gagal mengubah status kas: " + err.message, "error");
    })
    .toggleKas(nim, semester, tahun, currentOperator.nama);
}

function filterKasTable() {
  const divFilter = document.getElementById("kas-filter-divisi").value;
  const penFilter = document.getElementById("kas-filter-penerimaan").value;
  const searchInput = document.getElementById("kas-search-input").value.trim().toLowerCase();
  
  const rows = document.querySelectorAll("#kas-table-body .kas-row-item");
  
  rows.forEach(row => {
    const divisi = row.dataset.divisi;
    const penerimaan = row.dataset.penerimaan;
    const searchText = row.dataset.search;
    
    const matchesDivisi = !divFilter || divisi === divFilter;
    const matchesPenerimaan = !penFilter || penerimaan === penFilter;
    const matchesSearch = !searchInput || searchText.includes(searchInput);
    
    if (matchesDivisi && matchesPenerimaan && matchesSearch) {
      row.style.display = "";
    } else {
      row.style.display = "none";
    }

function exportKasToExcel() {
  const semester = document.getElementById("kas-semester-select").value;
  const tahun = document.getElementById("kas-tahun-select").value.trim();
  const filename = `Kas_Semester_${semester}_${tahun.replace('/', '_')}.xlsx`;
  
  const rows = [
    ["No", "Nama Lengkap", "NIM", "Divisi", "Gelombang", "Status Kas", "Tanggal Bayar"]
  ];
  
  const tacticalList = currentKasList.filter(a => a.jabatan === "Anggota");
  
  const divFilter = document.getElementById("kas-filter-divisi").value;
  const penFilter = document.getElementById("kas-filter-penerimaan").value;
  const searchInput = document.getElementById("kas-search-input").value.trim().toLowerCase();
  
  let index = 1;
  tacticalList.forEach(a => {
    const matchesDivisi = !divFilter || a.divisi === divFilter;
    const matchesPenerimaan = !penFilter || String(a.penerimaanKe) === penFilter;
    const matchesSearch = !searchInput || a.nama.toLowerCase().includes(searchInput) || String(a.nim).includes(searchInput);
    
    if (matchesDivisi && matchesPenerimaan && matchesSearch) {
      rows.push([
        index++,
        a.nama,
        a.nim,
        a.divisi,
        `Gelombang ${a.penerimaanKe}`,
        a.status,
        a.tanggalBayar || "-"
      ]);

  const worksheet = XLSX.utils.aoa_to_sheet(rows);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Kas");
  XLSX.writeFile(workbook, filename);
  showToast("Laporan Kas berhasil diekspor ke Excel.", "success");
}

function makeRekeningEditable(nim) {
  const span = document.getElementById(`rek-span-${nim}`);
  const container = document.getElementById(`rek-edit-container-${nim}`);
  const input = document.getElementById(`rek-input-${nim}`);
  
  if (span && container && input) {
    span.style.display = "none";
    container.style.display = "block";
    input.focus();
    const val = input.value;
    input.value = "";
    input.value = val;
  }
}

function saveRekeningInline(nim) {
  const span = document.getElementById(`rek-span-${nim}`);
  const container = document.getElementById(`rek-edit-container-${nim}`);
  const input = document.getElementById(`rek-input-${nim}`);
  
  if (!span || !container || !input) return;
  
  const newVal = input.value.trim();
  const oldVal = span.textContent.trim() === 'Klik untuk mengisi' ? '' : span.textContent.trim();
  
  span.style.display = "inline-block";
  container.style.display = "none";
  
  if (newVal === oldVal) {
    return;
  }
  
  span.textContent = newVal || 'Klik untuk mengisi';
  
  showLoader();
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      showToast(res.message, "success");
      const member = anggotaList.find(a => a.nim === nim);
      if (member) {
        member.rekeningBNI = newVal;
      }
      renderRekeningTable();
    })
    .withFailureHandler(function(err) {
      hideLoader();
      showToast("Gagal memperbarui rekening: " + err.message, "error");
      span.textContent = oldVal || 'Klik untuk mengisi';
      input.value = oldVal;
    })
    .updateRekeningAnggota(nim, newVal, currentOperator.nama);
}

function handleRekeningKeydown(event, nim) {
  if (event.key === "Enter") {
    event.preventDefault();
    saveRekeningInline(nim);
  } else if (event.key === "Escape") {
    const span = document.getElementById(`rek-span-${nim}`);
    const container = document.getElementById(`rek-edit-container-${nim}`);
    const input = document.getElementById(`rek-input-${nim}`);
    
    if (span && container && input) {
      input.value = span.textContent === 'Klik untuk mengisi' ? '' : span.textContent.trim();
      span.style.display = "inline-block";
      container.style.display = "none";
    }
  }
}

        a.nim,
        a.divisi,
        `Gelombang ${a.penerimaanKe}`,
        a.rekeningBNI || "-"
      ]);
    }
  });
  
  const worksheet = XLSX.utils.aoa_to_sheet(rows);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Rekening Anggota");
  XLSX.writeFile(workbook, filename);
  showToast("Database rekening BNI berhasil diekspor.", "success");
}
</script>
